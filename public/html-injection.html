<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulnerable HTML Injection Page</title>
</head>
<body>
<div style="font-family: Arial, sans-serif; margin: 50px;">
<h2>Search Results</h2>
<p>You searched for: <span id="search-query"></span></p>
</div>
 
    <script>
        // Extract the 'q' parameter from the URL (e.g., vulnerable.html?q=test)
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
 
        if (query) {
            // VULNERABILITY: Directly rendering unsanitized input via innerHTML
            document.getElementById('search-query').innerHTML = query;
        } else {
            document.getElementById('search-query').innerText = "Nothing";
        }
</script>
</body>
</html>
